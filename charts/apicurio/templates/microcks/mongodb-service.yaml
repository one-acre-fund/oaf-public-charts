{{- if .Values.microcks.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "microcks.mongodb.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "microcks.mongodb.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  ports:
    - name: {{ .Values.microcks.mongodb.service.portName }}
      port: {{ .Values.microcks.mongodb.service.port }}
      protocol: TCP
      targetPort: mongodb
  selector:
    {{- include "microcks.mongodb.selectorLabels" . | nindent 4 }}
{{- end }}
